<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>Portfolio</h1>
    <p class="tagline">Code, snippets, and files for later.</p>
  </header>

  <main>
    <section id="projects">
      <h2>Projects</h2>
      <div id="projects-list" class="list"></div>
    </section>

    <section id="files">
      <h2>Files</h2>
      <p class="section-note">Reference files, configs, and snippets you may need someday.</p>
      <div id="files-list" class="list"></div>
    </section>
  </main>

  <footer>
    <p>Drop files into <code>projects/</code> or <code>files/</code>, then run <code>.\scripts\update.ps1</code>.</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
